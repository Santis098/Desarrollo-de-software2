# ===============================
# CONFIGURACION DE BASE DE DATOS
# Los valores se inyectan por variables de entorno (Render / Docker).
# Defineelos en docker-compose.yml, el dashboard de Render, o un .env local.
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Limitar conexiones (plan free / pooler de Supabase)
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:1}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:0}

# ===============================
# CONFIGURACION JPA
# ===============================
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=public

# ===============================
# SERVIDOR
# ===============================
server.port=${PORT:8080}
server.address=0.0.0.0

# ===============================
# FLYWAY
# ===============================
spring.flyway.enabled=${FLYWAY_ENABLED:false}

# ===============================
# LOGGING
# ===============================
logging.level.org.hibernate.SQL=${LOG_SQL_LEVEL:DEBUG}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${LOG_SQL_BIND_LEVEL:TRACE}
