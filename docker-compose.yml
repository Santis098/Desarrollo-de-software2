# Compose para correr backend + frontend en local con Docker.
# Uso:
#   docker compose up --build
# Backend -> http://localhost:8080
# Frontend (web) -> http://localhost:3000

services:
  backend:
    build:
      context: ./backend/backend
      dockerfile: Dockerfile
    container_name: inventario-backend
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      # Las credenciales de DB se pasan desde el host (.env en la raiz del repo).
      # Crea un archivo .env con:
      #   SPRING_DATASOURCE_URL=jdbc:postgresql://host:5432/db?sslmode=require
      #   SPRING_DATASOURCE_USERNAME=postgres
      #   SPRING_DATASOURCE_PASSWORD=secret
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      JPA_DDL_AUTO: update
      LOG_SQL_LEVEL: INFO
      LOG_SQL_BIND_LEVEL: INFO
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend/inventario-app
      dockerfile: Dockerfile
      args:
        # En local el frontend apunta al backend dockerizado
        EXPO_PUBLIC_API_URL: http://localhost:8080
    container_name: inventario-frontend
    ports:
      - "3000:8080"
    environment:
      PORT: 8080
    depends_on:
      - backend
    restart: unless-stopped
